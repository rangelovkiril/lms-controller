services:
  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:3000
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-4001}:3000"
    environment:
      HOSTNAME: "0.0.0.0"
      BACKEND_URL: http://backend:3000
      INTERNAL_KEY: ${INTERNAL_KEY}
    depends_on:
      - backend

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BACKEND_PORT:-4000}:3000"
    environment:
      NODE_ENV: production
      CORS_ORIGIN: https://lmsproject.space
      MQTT_BROKER_URL: mqtt://mqtt:1883
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG:-LightMySatellite}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_KEY: ${INTERNAL_KEY}
      AUTH_DB_PATH: /app/data/auth.db
    volumes:
      - auth-data:/app/data
    depends_on:
      influxdb:
        condition: service_healthy
      mqtt:
        condition: service_started

  influxdb:
    image: influxdb:2
    restart: unless-stopped
    ports:
      - "127.0.0.1:${INFLUX_PORT:-8086}:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_ADMIN_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_ADMIN_PASSWORD:-adminpassword123}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:-LightMySatellite}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET:-slr}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  mqtt:
    image: eclipse-mosquitto:latest
    restart: unless-stopped
    volumes:
      - ./broker/config:/mosquitto/config:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

volumes:
  influxdb-data:
  mosquitto-data:
  mosquitto-log:
  auth-data:
